- # ====== Page Item: P9999_REMEMBER ===========================
  id: 12050541237520935
  identification: 
    name: P9999_REMEMBER
    type: Checkbox Group

  label: 
    label: Remember username
    alignment: Right

  settings: 
    number-of-columns: 1

  multiple-values: 
    type: Delimited List
    separator: ':'

  layout: 
    sequence: 30
    region: Home - Portale Unico # 12048665696520926
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Hidden
    template-options: 
    - '#DEFAULT#'

  validation: 
    value-required: false

  list-of-values: 
    type: Shared Component
    list-of-values: LOGIN_REMEMBER_USERNAME # 12049725829520933
    display-extra-values: false

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Null
    used: Only when current value in session state is null

  session-state: 
    storage: Per Request (Memory Only)

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: apex_authentication.persistent_cookies_enabled

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    escape-special-characters: true
    restricted-characters: All characters can be saved.

  help: 
    help-text: |
      <p>
      If you select this checkbox, the application will save your username in a persistent browser cookie named "LOGIN_USERNAME_COOKIE".
      When you go to the login page the next time,
      the username field will be automatically populated with this value.
      </p>
      <p>
      If you deselect this checkbox and your username is already saved in the cookie,
      the application will overwrite it with an empty value.
      You can also use your browser's developer tools to completely remove the cookie.
      </p>

