      l_exists   INTEGER;
      BEGIN
          l_bfile := BFILENAME('ESTRAZIONI', 'estrazione_' || :P31_ID_ESTRAZIONE || '.zip');
          l_exists := DBMS_LOB.fileexists(l_bfile);
      
          IF l_exists = 1 THEN
              return TRUE;
          ELSE
              return FALSE;
          END IF;
      
      END;

