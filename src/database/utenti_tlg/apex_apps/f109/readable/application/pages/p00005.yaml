- # ====== Region: QuadriOffline ===============================
  id: 39866481971671631
  identification: 
    name: QuadriOffline
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select a.descrizione area, si.* from aes_tlr.v_stat_installazione_all si
           inner join utenti_tlg.TBL_AREA_LOCALITA al ON substr(si.nome_sst, 4,2) = al.LOCALITA_BREVE
           inner join utenti_tlg.TBL_AREE a on a.id = al.id_area
      where trunc(sysdate)- trunc(DATA_ULTIMO_INVIO) = :P5_GIORNI
      and   nvl(:P5_AREAGEO, a.id) = a.id
      
      

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Interactive Report
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Item != Value
    item: P5_GIORNI
    value: '> 6'

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

