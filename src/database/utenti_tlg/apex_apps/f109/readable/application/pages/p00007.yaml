    execution: 
      sequence: 50
      event: New # 147940282507246695
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 147941621269246708
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var itemValue = $v('P7_ID_AREE_UTENTE_COPIATO');
        var ids = itemValue.split(':');
        var areas = [];
        
        for (var i = 0; i < ids.length; i++) {
            if (ids[i] === '1') {
                areas.push('TORINO');
            } else if (ids[i] === '2') {
                areas.push('GENOVA');
            } else if (ids[i] === '3') {
                areas.push('EMILIA');
            } else if (ids[i] === '4') {
                areas.push('DOGLIANI');
            }
        }
        
        $s('P7_ID_AREE', ids, areas);
        

    execution: 
      sequence: 60
      event: New # 147940282507246695
      fire-when-event-result-is: True
      fire-on-initialization: false

