    - '#DEFAULT#'
    height: 5

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      select apex_app_id || ' - ' || applicazione as applicazione, a.id_applicazione
      from utenti_tlg.tbl_anag_applicazioni a
      order by apex_app_id
      
    display-extra-values: false

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT listagg(id_applicazione, ':'ON OVERFLOW TRUNCATE) within group (order by id_ruolo_portale)
      FROM TBL_RUOLO_PORTALE_APPLICAZIONE trpa 
      WHERE ID_RUOLO_PORTALE = :P22_RUOLO_PORTALE
    used: Always, replacing any existing value in session state

  session-state: 
    storage: Per Session (Persistent)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

dynamic-actions: 
- # ====== Dynamic Action: New =================================
  id: 28437373344845766
  identification: 
    name: New

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P22_APPL

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 28437437296845767
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        Declare
          Cursor c_values
           is 
          Select
            t.column_value As app_id
          From
             Table ( apex_string.split(:P22_APPL, ':') ) t
          Where
             t.column_value Is Not Null;
        Begin
          apex_debug.message('in process: '|| :P22_APPL || ', Ruolo: ' || :P22_RUOLO_PORTALE);
          delete from tbl_ruolo_portale_applicazione where id_ruolo_portale = :P22_RUOLO_PORTALE;
          for c in c_values loop
             insert into tbl_ruolo_portale_applicazione (id_ruolo_portale,id_applicazione)
               values (:P22_RUOLO_PORTALE, c.app_id);
          end loop;
        End;
      items-to-submit: 
      - P22_APPL

    execution: 
      sequence: 10
      event: New # 28437373344845766
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

