- # ====== Region: AnomalieRegolatori ==========================
  id: 22991943078039670
  identification: 
    name: AnomalieRegolatori
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select a.descrizione area, si.*
      from aes_tlr.tbl_stat_installazione si
           INNER JOIN utenti_tlg.TBL_AREA_LOCALITA al ON substr(si.nome_sst, 4,2) = al.LOCALITA_BREVE
           inner join utenti_tlg.TBL_aree a on al.id_area = a.id
      where gprs= 'Si'
      and nvl(:P4_AREAGEO, a.id) = a.id
      and sysdate-nvl(lastclock_dan,sysdate)>2 
      and sysdate-nvl(lastclock_sie,sysdate)>2 
      and sysdate-nvl(lastclock_rvl,sysdate)>2

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Interactive Report
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Item = Value
    item: P4_ANOMALIA
    value: Regolatori

