- # ====== Region: Elenco Utenti ===============================
  id: 54841796136066287
  identification: 
    name: Elenco Utenti
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select tau.id_utente USERID,
             tau.ldap_account,
             upper(tau.nome_utente) nome_utente,
             tau.last_login,
             tau.last_ip,
             --SURNAME,
             ug.usrgrpid,
             g.name GROUPNAME,
             nvl(tau.ruolo_monitoraggio, 1) ruolo_monitoraggio
             --,
             --TYPE,
             --ATTEMPT_FAILED,
             --ATTEMPT_IP,
             --ATTEMPT_CLOCK
        from  UTENTI_TLG.TBL_ANAG_UTENTI tau inner join monitoraggio_tlg.USERS_GROUPS_NEW  ug on tau.id_utente = ug.userid
             inner join monitoraggio_tlg.usrgrp g on g.usrgrpid = ug.usrgrpid
      where g.usrgrpid = nvl(:P18_USRGRPID,g.usrgrpid)  --or 1 = 1
      --order by upper(tau.nome_utente)
    page-items-to-submit: 
    - P18_USRGRPID

  layout: 
    sequence: 30
    parent-region: No Parent
    slot: BODY
