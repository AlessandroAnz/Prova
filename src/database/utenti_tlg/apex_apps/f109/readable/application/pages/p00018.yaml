processes: 
- # ====== Process: DeleteUserFromGroup ========================
  id: 28062779601758230
  identification: 
    name: DeleteUserFromGroup
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          l_userid    utenti_tlg.tbl_anag_utenti.id_utente%type;
          l_values    apex_json.t_values;
          l_row_count PLS_INTEGER;
      BEGIN
          apex_debug.message('inside process Delete User From Group');
          -- parse text to JSON
          apex_json.parse(p_values => l_values, p_source => :P18_SELECTED_ROWS);
          apex_debug.message('In process: '|| :P18_SELECTED_ROWS);
          -- get number of rows selected
          l_row_count := apex_json.get_count(p_path => 'rows', p_values => l_values);
          apex_debug.message('In process - count: '|| l_row_count);
          -- loop through the selected rows
          FOR i IN 1..l_row_count LOOP
              -- get Primary Key value from JSON data
              l_userid := null;
              -- if primary key column type is not a number type, then remove TO_NUMBER part
              l_userid := TO_NUMBER(apex_json.get_varchar2(p_path => 'rows[%d].usrID', p0 => i, p_values => l_values));
              apex_debug.message('l_userid: ' || l_userid);
              -- update employee commission
              DELETE FROM monitoraggio_tlg.USERS_GROUPS_NEW   WHERE usrgrpid = :P18_USRGRPID AND userid = l_userid;
          END LOOP;
      END;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Utente/i dissociato/i dal gruppo

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: EliminaUtente # 28060951099758228

