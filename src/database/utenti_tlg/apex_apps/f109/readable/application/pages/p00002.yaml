    location: Local Database
    type: SQL Query
    sql-query: |
      /*select area, "LOCALITA_BREVE","SEDE_TECNICA","PESO_LORDO","VIA","LOCALITA",to_date("IN_FUNZ_DAL", 'dd/mm/yyyy') IN_FUNZ_DAL,
             "STATO_UTENTE","ST_SUPERIORE","STATO_SISTEMA","PRODUTTORE","A_COST","MESE_DI_COSTR",
             "CAMPO_SORT","ZONA","BCT","N_SST","VOLUMETRIA","ACCENSIONE","COUTENZA","COORDINATORE_LAVORI",
             "ASSISTENTE_LAVORI","PROPRIETA","TIPO_CESPITE","TIPOLOGIA_UTENZA","TIPOLOGIA_FORNITURA",
             "LIVELLO_COMPETENZA","TIPO_IMPIANTO","POZZETTO","FASCE_ORARIE_ACCENSI_1","FASCE_ORARIE_ACCENSI_2",
             "N_PRATICA_ISPESL","POTENZA_IMPEGNATA","POMPE_COLLEGATE_CENT","INTEGR_COSTRUTTORE","CENTRALINA_MODELLO",
             "NOME_IMPRESA_GEST","LIVELLO_SENSIBILITA"
      from aes_tlr.v_aes_imprese_totali ai
      where substr(in_funz_dal,7)>= to_char(to_number(to_char(sysdate,'yyyy'))-1)
      and   nvl(:P2_AREAGEO, ai.areaid) = ai.areaid
      and   substr(in_funz_dal,7) = nvl(:P2_ANNO, substr(in_funz_dal,7))*/
      
      select *
      from aes_tlr.v_aes_imprese_totali ai
      where substr(in_funz_dal,7)>= to_char(to_number(to_char(sysdate,'yyyy'))-1)
      and   nvl(:P2_AREAGEO, ai.areaid) = ai.areaid
      and   substr(in_funz_dal,7) = nvl(:P2_ANNO, substr(in_funz_dal,7))

