- # ====== Region: Tipologia Quadri Anno Precedente ============
  id: 13135012982777180
  identification: 
    name: Tipologia Quadri Anno Precedente
    type: Chart

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select count(*), tipo_quadro
      from aes_tlr.v_stat_installazione_all si 
           inner join utenti_tlg.TBL_AREA_LOCALITA al ON substr(si.nome_sst, 4,2) = al.LOCALITA_BREVE
           inner join utenti_tlg.TBL_AREE a on a.id = al.id_area
      where to_char(data_inst_quadro,'yyyy') = to_char(add_months(sysdate,-12),'yyyy')
      and   nvl(:P1_AREAGEO, a.id) = a.id
      group by tipo_quadro
      order by 2;

  layout: 
    sequence: 10
    parent-region: Quadri attivati # 13134816504777178
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
