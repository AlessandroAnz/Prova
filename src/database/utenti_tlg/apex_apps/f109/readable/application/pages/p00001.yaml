- # ====== Region: Localizzazione Quadri =======================
  id: 13134069446777171
  identification: 
    name: Localizzazione Quadri
    type: Map

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select --'prova' as host, 45.07110771 as latitude, 76.48112869 as longitude   from dual
      sede, latitude, longitude
      /*, i.description || ': ' || lastvalue as lastvalue, case when lastvalue < 20 then 'red' 
                                                 when lastvalue < 25 then 'yellow'
                                                 else 'blue'
                                            end color
      */
      from monitoraggio_tlg.v_zbx_hosts h 
           --inner join monitoraggio_tlg.hosts_profiles_ext hp on h.hostid = hp.hostid
           inner join aes_tlr.v_zbx_imprese hp on substr(h.host,1,16) = hp.sede
      --     inner join monitoraggio_tlg.items i on i.hostid = h.hostid and key_ = 'SIE255_02_04'
      where nvl(hp.latitude, 0) != 0
      and nvl(:P1_AREAGEO, h.areaid) = h.areaid
      --and rownum < 2
      
      /*
      select host, latitude, longitude 
      from monitoraggio_tlg.v_zbx_hosts h 
           inner join monitoraggio_tlg.hosts_profiles_ext hp on h.hostid = hp.hostid
      where hp.latitude is not null
      and nvl(:P1_AREAGEO, h.areaid) = h.areaid
      */

  layout: 
    sequence: 20
    parent-region: <h2> Dashboard Sistema SAC TLR</h2><h4> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &P1_C1.  </h4> # 13134551855777176
