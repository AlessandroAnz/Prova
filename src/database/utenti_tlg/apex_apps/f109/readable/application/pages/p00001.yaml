- # ====== Dynamic Action: set_profilo_impresa =================
  id: 24672296463309163
  identification: 
    name: set_profilo_impresa

  execution: 
    sequence: 10
    event-scope: Static

  when: 
    event: Page Load

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 24672379524309164
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
        V_IMPRESA  VARCHAR2(50);
        V_PROFILO  VARCHAR2(50);
        V_ID_IMPRESA integer;
        
        BEGIN
        SELECT pkg_user_utilities.f_calcola_nome_impresa(:APP_USER) INTO V_IMPRESA from dual;
        :G_IMPRESA := V_IMPRESA;
        SELECT pkg_user_utilities.f_calcola_profilo(:APP_USER) INTO V_PROFILO from dual;
        :G_PROFILO := V_PROFILO;
        SELECT pkg_user_utilities.f_calcola_id_impresa(:APP_USER) into V_ID_IMPRESA from dual;
        :G_ID_IMPRESA := V_ID_IMPRESA;
        END;

    execution: 
      sequence: 10
      event: set_profilo_impresa # 24672296463309163
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

