  list-of-values: 
    type: SQL Query
    sql-query: |
      select distinct job_name
      from monitoraggio_tlg.tbl_job_monitoring 
      where schema_name = :P35_SCHEMA
      and job_name not in (
              select job_name 
              from monitoraggio_tlg.tbl_job_monitoring_alarm 
              where schema_name = :P35_SCHEMA
              and apex_user = :app_user
