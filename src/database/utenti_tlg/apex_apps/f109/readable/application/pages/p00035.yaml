- # ====== Dynamic Action: New_2 ===============================
  id: 327472951142209190
  identification: 
    name: New_2

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: Aggiungi_tutti # 327472864284209189

  actions: 
  - # ====== Action: Confirm =====================================
    id: 327473035627209191
    identification: 
      action: Confirm

    settings: 
      message: Sei sicuro di voler aggiungere tutti i job di tutti gli schema ai tuoi job monitorati? potrai comunque cancellarne alcuni successivamente.
      style: Information
      icon: fa-info
      confirm-label: CONFERMA E AGGIUNGI
      cancel-label: INDIETRO

    execution: 
      sequence: 10
      event: New_2 # 327472951142209190
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute JavaScript Code =====================
    id: 327473147367209192
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: apex.region("myjobs").refresh();

    execution: 
      sequence: 30
      event: New_2 # 327472951142209190
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 327473282797209193
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        BEGIN
            INSERT INTO monitoraggio_tlg.tbl_job_monitoring_alarm (job_name, apex_user, schema_name)
            SELECT m.job_name,
                   :APP_USER,
                   m.schema_name
              FROM monitoraggio_tlg.tbl_job_monitoring m
             WHERE NOT EXISTS (
                       SELECT 1
                         FROM monitoraggio_tlg.tbl_job_monitoring_alarm a
                        WHERE a.job_name    = m.job_name
                          AND a.schema_name = m.schema_name
                          AND a.apex_user   = :APP_USER
                   );
            COMMIT;
        END;

    execution: 
      sequence: 20
      event: New_2 # 327472951142209190
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Value ===================================
    id: 327473349839209194
    identification: 
      action: Set Value

    settings: 
      set-type: Static Assignment
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P35_SCHEMA
      - P35_JOB

    execution: 
      sequence: 40
      event: New_2 # 327472951142209190
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

