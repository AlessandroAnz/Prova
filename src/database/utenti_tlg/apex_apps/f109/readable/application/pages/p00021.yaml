- # ====== Process: AddGroupToRights ===========================
  id: 28126072236817157
  identification: 
    name: AddGroupToRights
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          l_groupid   monitoraggio_tlg.groups.groupid%type;
          l_values    apex_json.t_values;
          l_row_count PLS_INTEGER;
          l_rid       PLS_INTEGER;
      BEGIN
          apex_debug.message('inside process Bulk Add User To Group');
          -- parse text to JSON
          apex_json.parse(p_values => l_values, p_source => :P21_SELECTED_ROWS);
          apex_debug.message('In process: '|| :P21_SELECTED_ROWS);
          -- get number of rows selected
          l_row_count := apex_json.get_count(p_path => 'rows', p_values => l_values);
          apex_debug.message('In process - count: '|| l_row_count);
          -- loop through the selected rows
          FOR i IN 1..l_row_count LOOP
              -- get Primary Key value from JSON data
              l_groupid := null;
              -- if primary key column type is not a number type, then remove TO_NUMBER part
              l_groupid := TO_NUMBER(apex_json.get_varchar2(p_path => 'rows[%d].grpID', p0 => i, p_values => l_values));
              apex_debug.message('l_groupid' || l_groupid);
              -- update employee commission
              select max(rightid)+1 into l_rid from monitoraggio_tlg.rights;
              INSERT INTO monitoraggio_tlg.rights (rightid, groupid, permission, id) values (l_rid,:P21_USRGRPID, 3, l_groupid);
          END LOOP;
      END;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Baricentri assegnati al Gruppo

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: SAVE # 28123029355817154

