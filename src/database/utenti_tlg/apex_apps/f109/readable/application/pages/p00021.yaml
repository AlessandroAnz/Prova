- # ====== Region: Aggiungi BCT o Gruppo =======================
  id: 67958919450741157
  identification: 
    name: Aggiungi BCT o Gruppo
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT g2.NAME, g2.GROUPID 
      FROM monitoraggio_tlg.GROUPS g2 
      MINUS
      SELECT g.NAME, g.GROUPID 
      FROM monitoraggio_tlg.usrgrp ug INNER JOIN monitoraggio_tlg.RIGHTS r ON ug.USRGRPID = r.GROUPID 
      INNER JOIN monitoraggio_tlg.GROUPS g ON g.GROUPID = r.ID 
      WHERE  ug.USRGRPID = :P21_USRGRPID;

