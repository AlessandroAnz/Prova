- # ====== Authorization: AUT_TAB_ALLARMI ======================
  id: 347795054657669006
  identification: 
    name: AUT_TAB_ALLARMI

  subscription: 
    version-number: 1

  authorization-scheme: 
    type: Exists SQL Query

  settings: 
    sql-query: |
      SELECT 1
      FROM TBL_ANAG_UTENTI A 
             inner join TBL_UTENTI_PROFILI_APPLICAZIONI B  on A.ID_UTENTE = B.ID_UTENTE
             inner join tbl_anag_applicazioni aa on aa.id_applicazione = b.id_applicazione
      where aa.id_applicazione = 3
      AND a.ID_utente IN (282, 283, 284, 285, 286, 287, 37, 86, 87, 110, 166, 191, 209, 4, 98, 144, 137, 877, 168)               
      AND UPPER(A.LDAP_ACCOUNT) = UPPER(:APP_USER);

  server-cache: 
    evaluation-point: Once per Session

  error: 
    error-message: L'utente non è abilitato a questa funzione!

