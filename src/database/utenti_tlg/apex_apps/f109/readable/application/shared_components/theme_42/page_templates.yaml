- # ====== Page Template: Drawer ===============================
  id: 11854779424520685
  identification: 
    name: Drawer
    identifier: DRAWER
    class: Custom 4

  subscription: 
    master: 
      referenced-id: 1659739787629394056

  advanced: 
    translatable: false

  template-options: 
    preset: 
    - js-dialog-class-t-Drawer--pullOutEnd

  page: 
    type: Dialog Page
    header: |
      <!DOCTYPE html>
      <html class="no-js #RTL_CLASS# page-&APP_PAGE_ID. app-&APP_ALIAS." lang="&BROWSER_LANGUAGE." #TEXT_DIRECTION#>
      <head>
        <meta http-equiv="x-ua-compatible" content="IE=edge" />
        <meta charset="utf-8">
        <title>#TITLE#</title>
        #APEX_CSS#
        #THEME_CSS#
        #TEMPLATE_CSS#
        #THEME_STYLE_CSS#
        #APPLICATION_CSS#
        #PAGE_CSS#
        #FAVICONS#
        #HEAD#
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      </head>
      <body class="t-Drawer-page t-PageTemplate--drawer #DIALOG_CSS_CLASSES# #PAGE_CSS_CLASSES#" #TEXT_DIRECTION# #ONLOAD#>
      #FORM_OPEN#
    body: |
      <div class="t-Drawer" role="dialog" aria-label="#TITLE#">
        <div class="t-Drawer-header">#REGION_POSITION_01#</div>
        <div class="t-Drawer-bodyWrapperOut">
          <div class="t-Drawer-bodyWrapperIn">
            <div class="t-Drawer-body" role="main">#SUCCESS_MESSAGE##NOTIFICATION_MESSAGE##GLOBAL_NOTIFICATION##BODY#</div>
          </div>
        </div>
        <div class="t-Drawer-footer">#REGION_POSITION_03#</div>
      </div>
    footer: |
      #FORM_CLOSE#
      #DEVELOPER_TOOLBAR#
      #APEX_JAVASCRIPT#
      #GENERATED_CSS#
      #THEME_JAVASCRIPT#
      #TEMPLATE_JAVASCRIPT#
      #APPLICATION_JAVASCRIPT#
      #PAGE_JAVASCRIPT#  
      #GENERATED_JAVASCRIPT#
      </body>
      </html>

  javascript: 
    execute-when-page-loads: apex.theme42.initializePage.modalDialog();
    dialog-initialization-code: "apex.theme42.dialog(#PAGE_URL#,{title:#TITLE#,w:#DIALOG_WIDTH#,mxw:#DIALOG_MAX_WIDTH#,modal:#IS_MODAL#,dialog:#DIALOG#,dlgCls:'t-Drawer-page--standard '+#DIALOG_CSS_CLASSES#,#DIALOG_ATTRIBUTES#},#PAGE_CSS_CLASSES#,#TRIGGERING_ELEMENT#)"
    dialog-closure-code: apex.theme42.dialog.close(#IS_MODAL#,#TARGET#)
    dialog-cancel-code: apex.theme42.dialog.cancel(#IS_MODAL#)

  subtemplate: 
    success-message: |
      <div class="t-Body-alert">
        <div class="t-Alert t-Alert--defaultIcons t-Alert--success t-Alert--horizontal t-Alert--page t-Alert--colorBG" id="t_Alert_Success" role="alert">
          <div class="t-Alert-wrap">
            <div class="t-Alert-icon">
              <span class="t-Icon"></span>
            </div>
            <div class="t-Alert-content">
              <div class="t-Alert-header">
                <h2 class="t-Alert-title">#SUCCESS_MESSAGE#</h2>
              </div>
            </div>
            <div class="t-Alert-buttons">
              <button class="t-Button t-Button--noUI t-Button--icon t-Button--closeAlert" onclick="apex.jQuery('#t_Alert_Success').remove();" type="button" title="#CLOSE_NOTIFICATION#"><span class="t-Icon icon-close"></span></button>
            </div>
          </div>
        </div>
      </div>
    notification: |
      <div class="t-Body-alert">
        <div class="t-Alert t-Alert--defaultIcons t-Alert--warning t-Alert--horizontal t-Alert--page t-Alert--colorBG" id="t_Alert_Notification" role="alert">
          <div class="t-Alert-wrap">
            <div class="t-Alert-icon">
              <span class="t-Icon"></span>
            </div>
            <div class="t-Alert-content">
              <div class="t-Alert-body">#MESSAGE#</div>
            </div>
            <div class="t-Alert-buttons">
              <button class="t-Button t-Button--noUI t-Button--icon t-Button--closeAlert" onclick="apex.jQuery('#t_Alert_Notification').remove();" type="button" title="#CLOSE_NOTIFICATION#"><span class="t-Icon icon-close"></span></button>
            </div>
          </div>
        </div>
      </div>

  layout: 
    type: Fixed Number of Columns
    maximum-columns: 12
    always-use-max-columns: true
    has-column-span: true
    always-render-layout: true
    emit-empty-leading-columns: true
    emit-empty-trailing-columns: false
    default-label-column-span: 2
    first-column-attributes: col-start
    last-column-attributes: col-end
    container-template: |
      <div class="container">
      #ROWS#
      </div>
    row-template: |
      <div class="row #CSS_CLASSES#">
      #COLUMNS#
      </div>
    column-template: '<div class="col col-#COLUMN_SPAN_NUMBER# #CSS_CLASSES# #FIRST_LAST_COLUMN_ATTRIBUTES#" #ATTRIBUTES#>#CONTENT#</div>'

  positions: 
