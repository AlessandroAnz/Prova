- # ====== Page Template: Marquee ==============================
  id: 11857637491520695
  identification: 
    name: Marquee
    identifier: MASTER_DETAIL
    class: No Tabs with Sidebar

  subscription: 
    master: 
      referenced-id: 1996914646461572319

  advanced: 
    translatable: false

  page: 
    type: Normal Page
    header: |
      <!DOCTYPE html>
      <html class="no-js #RTL_CLASS# page-&APP_PAGE_ID. app-&APP_ALIAS." lang="&BROWSER_LANGUAGE." #TEXT_DIRECTION#>
      <head>
        <meta http-equiv="x-ua-compatible" content="IE=edge" />
        <meta charset="utf-8">
        <title>#TITLE#</title>
        #APEX_CSS#
        #THEME_CSS#
        #TEMPLATE_CSS#
        #THEME_STYLE_CSS#
        #APPLICATION_CSS#
        #PAGE_CSS#
        #FAVICONS#
        #HEAD#
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      </head>
      <body class="t-PageBody t-PageBody--masterDetail t-PageBody--hideLeft no-anim t-PageTemplate--marquee #PAGE_CSS_CLASSES#" #TEXT_DIRECTION# #ONLOAD# id="t_PageBody">
      <script>(sessionStorage.getItem("ORA_WWV_apex.toggleCore.right.&APP_ID..&APP_PAGE_ID..preferenceForExpanded") === "true") ? document.getElementById('t_PageBody').classList.add('js-rightExpanded') : document.getElementById('t_PageBody').classList.add('js-rightCollapsed')</script>
      <a href="#main" id="t_Body_skipToContent">&APP_TEXT$UI_PAGE_SKIP_TO_CONTENT.</a>
      #FORM_OPEN#
      <header class="t-Header" id="t_Header" role="banner">
        #REGION_POSITION_07#
        <div class="t-Header-branding">
          <div class="t-Header-controls">
            <button class="t-Button t-Button--icon t-Button--header t-Button--headerTree" aria-label="&"APP_TEXT$APEX.TEMPLATE.MAIN_NAV_LABEL"." title="&"APP_TEXT$APEX.TEMPLATE.MAIN_NAV_LABEL"." id="t_Button_navControl" type="button"><span class="t-Header-controlsIcon" aria-hidden="true"></span></button>
          </div>
          <div class="t-Header-logo">
            <a href="#HOME_LINK#" class="t-Header-logo-link">#LOGO#</a>
            #AFTER_LOGO#
          </div>
          <div class="t-Header-navBar">
            <div class="t-Header-navBar--start">#BEFORE_NAVIGATION_BAR#</div>
            <div class="t-Header-navBar--center">#NAVIGATION_BAR#</div>
            <div class="t-Header-navBar--end">#AFTER_NAVIGATION_BAR#</div>
          </div>
        </div>
        <div class="t-Header-nav">#TOP_GLOBAL_NAVIGATION_LIST##REGION_POSITION_06#</div>
      </header>
    body: |
      <div class="t-Body">
        #SIDE_GLOBAL_NAVIGATION_LIST#
        <div class="t-Body-main">
          <div class="t-Body-title" id="t_Body_title">#REGION_POSITION_01#</div>
          <div class="t-Body-content" id="t_Body_content">
            <main id="main" class="t-Body-mainContent">
              #SUCCESS_MESSAGE##NOTIFICATION_MESSAGE##GLOBAL_NOTIFICATION#
              <div class="t-Body-fullContent">#REGION_POSITION_08#</div>
              <div class="t-Body-info" id="t_Body_info">#REGION_POSITION_02#</div>
              <div class="t-Body-contentInner" role="main">#BODY#</div>
            </main>
            <footer class="t-Footer" id="t_Footer" role="contentinfo">
              <div class="t-Footer-body">
                <div class="t-Footer-content">#REGION_POSITION_05#</div>
                <div class="t-Footer-apex">
                  <div class="t-Footer-version">#APP_VERSION#</div>
                  <div class="t-Footer-customize">#CUSTOMIZE#</div>
                  #BUILT_WITH_LOVE_USING_APEX#
                </div>
              </div>
              <div class="t-Footer-top">
                <a href="#top" class="t-Footer-topButton" id="t_Footer_topButton"><span class="a-Icon icon-up-chevron"></span></a>
              </div>
            </footer>
          </div>
        </div>
        <div class="t-Body-actions" id="t_Body_actions">
          <button class="t-Body-actionsToggle" title="#EXPAND_COLLAPSE_SIDE_COL_LABEL#" id="t_Button_rightControlButton" type="button"><span class="t-Body-actionsControlsIcon" aria-hidden="true"></span></button>
          <div class="t-Body-actionsContent" role="complementary">#REGION_POSITION_03#</div>
        </div>
      </div>
      <div class="t-Body-inlineDialogs" id="t_Body_inlineDialogs">#REGION_POSITION_04#</div>
    footer: |
      #FORM_CLOSE#
      #DEVELOPER_TOOLBAR#
      #APEX_JAVASCRIPT#
      #GENERATED_CSS#
      #THEME_JAVASCRIPT#
      #TEMPLATE_JAVASCRIPT#
      #APPLICATION_JAVASCRIPT#
      #PAGE_JAVASCRIPT#  
      #GENERATED_JAVASCRIPT#
      </body>
      </html>

